<!doctype html>
<html data-theme="light" data-color-scheme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' aion-asset:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://127.0.0.1:* http://127.0.0.1:* ws://localhost:* http://localhost:*; img-src 'self' data: aion-asset:; font-src 'self' data:; media-src 'self' aion-asset:; worker-src 'self' blob:;" />
    <meta name="application-name" content="Workspace Assistant" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Workspace Assistant" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4E5969" />
    <link rel="icon" type="image/png" href="./pwa/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa/icon-180.png" />
    <title>Workspace Assistant</title>
    <script>
      // Synchronously restore theme from localStorage to prevent theme flash
      (function () {
        try {
          var theme = localStorage.getItem('__aionui_theme');
          var colorScheme = localStorage.getItem('__aionui_colorScheme');
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          }
          if (colorScheme) {
            document.documentElement.setAttribute('data-color-scheme', colorScheme);
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      // Set arco-theme on body synchronously
      try {
        var t = localStorage.getItem('__aionui_theme');
        if (t) document.body.setAttribute('arco-theme', t);
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
